{% extends "base.html" %}

{% block title %}413 - File Too Large{% endblock %}

{% block content %}
<section class="error-section">
    <div class="container">
        <div class="error-content">
            <div class="error-code">413</div>
            <h1>File Too Large</h1>
            <p>The uploaded file exceeds the maximum size limit of 16MB.</p>
            <div class="error-actions">
                <a href="{{ url_for('scanner.index') }}" class="btn btn-primary">Try Again</a>
                <a href="{{ url_for('dashboard.index') }}" class="btn btn-outline">Dashboard</a>
            </div>
        </div>
    </div>
</section>
{% endblock %}
